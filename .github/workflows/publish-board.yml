name: Publish Board

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional render date override (YYYY-MM-DD). Defaults to the current date in Europe/Berlin."
        required: false
        type: string
  schedule:
    - cron: "7,22,37,52 22,23,0-5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      KFB_LOCATION_NAME: ${{ vars.KFB_LOCATION_NAME }}
      KFB_LATITUDE: ${{ vars.KFB_LATITUDE }}
      KFB_LONGITUDE: ${{ vars.KFB_LONGITUDE }}
      KFB_TIMEZONE: ${{ vars.KFB_TIMEZONE || 'Europe/Amsterdam' }}
      KFB_PUBLISH_TIMEZONE: ${{ vars.KFB_PUBLISH_TIMEZONE || 'Europe/Berlin' }}
      KFB_ICON_STYLE: ${{ vars.KFB_ICON_STYLE || 'burst' }}
      KFB_BOARD_URL: ${{ vars.KFB_BOARD_URL }}
    steps:
      - name: Resolve target publish date
        id: window
        shell: bash
        run: |
          publish_timezone="${KFB_PUBLISH_TIMEZONE:-Europe/Berlin}"
          local_hour=$(TZ="$publish_timezone" date +%H)
          local_date=$(TZ="$publish_timezone" date +%F)
          target_date="${{ github.event.inputs.target_date || '' }}"
          if [[ -z "$target_date" ]]; then
            target_date="$local_date"
          fi

          echo "target_date=$target_date" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            if [[ ! "$local_hour" =~ ^(00|01|02|03|04|05|06|07)$ ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            board_json_url="${KFB_BOARD_URL:-https://aabk6.github.io/kindle-family-board/latest.png}"
            board_json_url="${board_json_url%/latest.png}/latest.json"
            published_date="$(curl -fsSL "$board_json_url" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("render_date", ""))' 2>/dev/null || true)"
            if [[ "$published_date" == "$target_date" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.window.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.window.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build site
        if: steps.window.outputs.skip != 'true'
        run: python scripts/build_site.py --date "${{ steps.window.outputs.target_date }}"

      - name: Setup Pages
        if: steps.window.outputs.skip != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.window.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.window.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@v4
