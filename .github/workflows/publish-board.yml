name: Publish Board

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || secrets.GEMINI_API_KEY }}
      KFB_LOCATION_NAME: ${{ vars.KFB_LOCATION_NAME }}
      KFB_LATITUDE: ${{ vars.KFB_LATITUDE }}
      KFB_LONGITUDE: ${{ vars.KFB_LONGITUDE }}
      KFB_TIMEZONE: ${{ vars.KFB_TIMEZONE || 'Europe/Berlin' }}
      KFB_ICON_STYLE: ${{ vars.KFB_ICON_STYLE || 'burst' }}
      KFB_BOARD_URL: ${{ vars.KFB_BOARD_URL }}
    steps:
      - name: Check Berlin window
        id: window
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            berlin_hour=$(TZ="${KFB_TIMEZONE:-Europe/Berlin}" date +%H)
            if [[ "$berlin_hour" != "07" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.window.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.window.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build site
        if: steps.window.outputs.skip != 'true'
        run: python scripts/build_site.py

      - name: Setup Pages
        if: steps.window.outputs.skip != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.window.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.window.outputs.skip != 'true'
        uses: actions/deploy-pages@v4
